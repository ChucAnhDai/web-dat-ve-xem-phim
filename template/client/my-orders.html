<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinemaX — My Orders</title>
<link rel="stylesheet" href="styles.css">
<style>
.orders-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{display:grid;grid-template-columns:120px 1fr 130px 110px 110px 100px;gap:16px;padding:14px 20px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.table-row{display:grid;grid-template-columns:120px 1fr 130px 110px 110px 100px;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border2);align-items:center;transition:var(--transition)}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--bg3)}
.order-id{font-size:13px;font-weight:600;color:var(--red)}
.order-items-preview{display:flex;gap:4px}
.order-item-thumb{width:36px;height:36px;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.order-item-thumb img{width:100%;height:100%;object-fit:cover}
.more-items{width:36px;height:36px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center}
/* Order Detail Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:var(--transition)}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:90%;max-width:480px;padding:24px;position:relative;transform:scale(0.95);transition:var(--transition)}
.modal-overlay.open .modal{transform:scale(1)}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:var(--transition)}
.modal-close:hover{background:rgba(229,9,20,0.15);color:var(--red)}
@media(max-width:992px){.table-header{display:none}.table-row{grid-template-columns:1fr 1fr;font-size:12px}.table-row>*:nth-child(3),.table-row>*:nth-child(4){display:none}}
</style>
</head>
<body>
<div class="app-shell">
  <div id="cx-header"></div>
  <div id="cx-sidebar"></div>
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">My Orders</h1>
      <p class="page-subtitle">Track and manage your purchases</p>
    </div>
    <div class="filter-bar">
      <div class="filter-chip active" data-filter="all">All Orders</div>
      <div class="filter-chip" data-filter="processing">Processing</div>
      <div class="filter-chip" data-filter="delivered">Delivered</div>
      <div class="filter-chip" data-filter="cancelled">Cancelled</div>
    </div>
    <div class="orders-table">
      <div class="table-header">
        <span>Order ID</span><span>Items</span><span>Date</span><span>Amount</span><span>Status</span><span>Action</span>
      </div>
      <div id="ordersBody"></div>
    </div>
  </main>
  <div id="cx-footer"></div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script src="components.js"></script>
<script>
  CX.init('my-orders');

  const ORDERS = [
    {id:'#CX-2026-001',items:[{name:'Classic Popcorn Combo',img:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=100&q=80'},{name:'Large Cola',img:'https://images.unsplash.com/photo-1580031359745-f8ab35a1f9b5?w=100&q=80'},{name:'CinemaX T-Shirt',img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=100&q=80'}],date:'Mar 11, 2026',total:'$36.97',status:'delivered'},
    {id:'#CX-2026-002',items:[{name:'Large Cola',img:'https://images.unsplash.com/photo-1580031359745-f8ab35a1f9b5?w=100&q=80'}],date:'Mar 8, 2026',total:'$9.98',status:'processing'},
    {id:'#CX-2026-003',items:[{name:'CinemaX T-Shirt',img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=100&q=80'}],date:'Mar 2, 2026',total:'$24.99',status:'delivered'},
    {id:'#CX-2026-004',items:[{name:'VIP Combo Deluxe',img:'https://images.unsplash.com/photo-1576866209830-589e1bfbaa4d?w=100&q=80'},{name:'Nachos',img:'https://images.unsplash.com/photo-1513456852971-30c0b8199d4d?w=100&q=80'}],date:'Feb 28, 2026',total:'$30.98',status:'cancelled'},
    {id:'#CX-2026-005',items:[{name:'Caramel Popcorn',img:'https://images.unsplash.com/photo-1524041255072-7da0525d6b34?w=100&q=80'}],date:'Feb 20, 2026',total:'$6.99',status:'delivered'},
  ];

  let currentFilter = 'all';

  function renderOrders() {
    const list = currentFilter === 'all' ? ORDERS : ORDERS.filter(o=>o.status===currentFilter);
    const body = document.getElementById('ordersBody');
    if (!list.length) { body.innerHTML='<p style="color:var(--text2);padding:40px 20px;text-align:center">No orders found.</p>'; return; }
    body.innerHTML = list.map((o,i)=>`
      <div class="table-row">
        <span class="order-id">${o.id}</span>
        <div class="order-items-preview">
          ${o.items.slice(0,2).map(it=>`<div class="order-item-thumb"><img src="${it.img}" alt="" onerror="this.style.display='none'"></div>`).join('')}
          ${o.items.length>2?`<div class="more-items">+${o.items.length-2}</div>`:''}
        </div>
        <span style="font-size:12px;color:var(--text2)">${o.date}</span>
        <span style="font-weight:600">${o.total}</span>
        <span class="ticket-status status-${o.status}">${o.status}</span>
        <button class="btn btn-secondary btn-sm" onclick="viewOrder(${i})">View</button>
      </div>`).join('');
  }

  function viewOrder(idx) {
    const o = (currentFilter==='all'?ORDERS:ORDERS.filter(x=>x.status===currentFilter))[idx];
    document.getElementById('modalContent').innerHTML = `
      <h3 style="font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:0.5px;margin-bottom:4px">Order ${o.id}</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px">${o.date}</p>
      <div class="divider"></div>
      ${o.items.map(it=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2)">
        <div style="width:44px;height:44px;border-radius:6px;overflow:hidden;background:var(--bg3);flex-shrink:0"><img src="${it.img}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>
        <span style="font-size:13px;font-weight:600;flex:1">${it.name}</span>
      </div>`).join('')}
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;font-size:15px">Total: <span style="color:var(--red)">${o.total}</span></span>
        <span class="ticket-status status-${o.status}">${o.status}</span>
      </div>`;
    document.getElementById('orderModal').classList.add('open');
  }
  function closeModal() { document.getElementById('orderModal').classList.remove('open'); }
  document.getElementById('orderModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

  document.querySelectorAll('[data-filter]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderOrders();
    });
  });

  renderOrders();
</script>
</body>
</html>
